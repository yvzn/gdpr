<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50 dark:bg-gray-900/80"
  (click)="onBackdropClick($event)"
  (keyup.escape)="close()"
>
  <div class="relative w-full max-w-lg max-h-[80vh] bg-white rounded-lg shadow-sm dark:bg-gray-700">
    <div class="flex items-center justify-between p-4 border-b rounded-t dark:border-gray-600">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Select a Person</h3>
      <button
        type="button"
        (click)="close()"
        class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
      >
        <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
          />
        </svg>
        <span class="sr-only">Close</span>
      </button>
    </div>

    <div class="p-4">
      <input
        type="text"
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTerm.set($event)"
        placeholder="Search people..."
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white mb-4"
      />

      <div class="overflow-y-auto max-h-96 space-y-2">
        @for (person of filteredPeople(); track person.id) {
          <div
            class="p-3 bg-gray-50 rounded-lg hover:bg-gray-100 dark:bg-gray-600 dark:hover:bg-gray-500 cursor-pointer"
            (click)="selectPerson(person)"
            (keyup.enter)="selectPerson(person)"
            tabindex="0"
            role="button"
          >
            <p class="font-medium text-gray-900 dark:text-white">
              {{ person.fullName || 'Unnamed' }}
            </p>
            @if (person.email) {
              <p class="text-sm text-gray-500 dark:text-gray-400">{{ person.email }}</p>
            }
            @if (person.company) {
              <p class="text-sm text-gray-400 dark:text-gray-500">{{ person.company }}</p>
            }
          </div>
        } @empty {
          <p class="text-center text-gray-500 dark:text-gray-400 py-4">No people found.</p>
        }
      </div>
    </div>
  </div>
</div>
