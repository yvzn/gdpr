<div class="skeleton-detail" aria-hidden="true" role="status" aria-label="Loading content">
	<div class="skeleton-detail__line skeleton-detail__line--back"></div>
	<div class="skeleton-detail__line skeleton-detail__line--heading"></div>
	<div class="skeleton-detail__fields">
		@for (i of [1, 2, 3, 4, 5, 6]; track i) {
		<div class="skeleton-detail__field">
			<div class="skeleton-detail__line skeleton-detail__line--label"></div>
			<div class="skeleton-detail__line skeleton-detail__line--input"></div>
		</div>
		}
	</div>
</div>
